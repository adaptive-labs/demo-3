schemaVersion: 1

service:
  id: shoehorn-api
  name: Shoehorn Api
  type: api
description: The Shoehorn platform APIs

owner:
  - type: team
    id: platform-team

lifecycle: production

tags:
  - documentation
  - platform

relations:
  - type: consumes_api
    target: service:shoehorn-search
    notes: User authentication and session management

interfaces:
  http:
    # Option 1: URL to OpenAPI spec (public Petstore API for testing)
    openapi: https://petstore3.swagger.io/api/v3/openapi.json

    # Option 2: Relative path to OpenAPI spec in repository (uncomment to test)
    # openapi: ./openapi.yaml

    # Option 3: Another public API example
    # openapi: https://api.github.com/openapi.json
