schemaVersion: 1

service:
  id: shoehorn-api
  name: Shoehorn Api
  type: api
description: The Shoehorn platform APIs

owner:
  - type: team
    id: platform-team
  - type: stakeholder
    id: platform-team
  - type: owner
    id: shoehorn-dev
  - type: designer
    id: anders-b

lifecycle: development

links:
  - name: Website
    url: https://shoehorn.dev
    icon: Link
  - name: Organization
    url: https://github.com/shoehorn-dev
    icon: Github

tags:
  - documentation
  - platform

relations:
  - type: consumes_api
    target: service:shoehorn-search
    notes: Search Engine

interfaces:
  http:
    # Option 1: URL to OpenAPI spec (public Petstore API for testing)
    openapi: https://petstore3.swagger.io/api/v3/openapi.json

    # Option 2: Relative path to OpenAPI spec in repository (uncomment to test)
    # openapi: ./openapi.yaml
