schemaVersion: 1

service:
  id: shoehorn-api
  name: Shoehorn Api
  type: api
  tier: Platinum
description: The Shoehorn platform APIs

docs:
  - readme:
    path: README.md

owner:
  - type: team
    id: platform-team
  - type: stakeholder
    id: shoehorn-dev
  - type: owner
    id: peter akimoto
  - type: designer
    id: friendly software inc

lifecycle: development

links:
  - name: Website
    url: https://shoehorn.dev
    icon: Link
  - name: Organization
    url: https://github.com/shoehorn-dev
    icon: Github

integrations:
  licenses:
    - title: PostgreSQL Managed
      vendor: upcloud
      purchased: "2025-01-01"
      expires: "2025-12-31"
      seats: 10
      cost: "$500/year"
      contract: ENT-12345
      notes: Production database license
    - title: Grafana Enterprise
      vendor: Grafana
      expires: "2026-06-30"
      cost: "$240/year"
  runbooks:
    - title: Database Recovery
      path: runbooks/db-recovery.md
      severity: critical
    - title: Cache Invalidation
      path: runbooks/cache-clear.md
      severity: low

tags:
  - documentation
  - platform

relations:
  - type: consumes_api
    target: service:shoehorn-search
    notes: Search Engine

interfaces:
  http:
    # Option 1: URL to OpenAPI spec (public Petstore API for testing)
    openapi: https://petstore3.swagger.io/api/v3/openapi.json

    # Option 2: Relative path to OpenAPI spec in repository (uncomment to test)
    # openapi: ./openapi.yaml
