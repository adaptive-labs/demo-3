schemaVersion: 1

service:
  id: shoehorn-platform
  name: Shoehorn
  type: service
description: The Shoehorn platform

owner:
  - type: team
    id: platform-team

lifecycle: production

tags:
  - documentation
  - platform

links:
  - name: Website
    url: https://shoehorn.dev
    icon: Link
  - name: Demo site
    url: https://demo.shoedocs.dev
    icon: Link
  - name: Organization
    url: https://github.com/shoehorn-dev
    icon: Github

relations:
  - type: consumes_api
    target: service:shoehorn-api
    notes: Shoehorn API for documentation management
  - type: consumes_api
    target: service:shoehorn-search
    notes: User authentication and session management
  - type: consumes_api
    target: service:ml-recommendation-service
    notes: Personalized content recommendations
  - type: deployed_to
    target: service:cloudfront-cdn
    notes: Static assets via CDN
